- name: Create Redis Cluster
  hosts: redis-node-1
  become: yes

  tasks:
    - name: Create Redis Cluster
      shell: |
        yes yes | redis-cli --cluster create \
        10.10.0.11:6379 \
        10.10.0.12:6379 \
        10.10.0.13:6379 \
        10.10.0.14:6379 \
        10.10.0.15:6379 \
        10.10.0.16:6379 \
        --cluster-replicas 1
      args:
        executable: /bin/bash
